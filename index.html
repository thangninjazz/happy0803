<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GỬI YẾN XINH ĐẸP</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;

        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        overflow: hidden;
        font-family: sans-serif;
        text-align: center;
        color: white;
        height: 100%;
        overflow-y: auto;
      }

      h1 {
        margin-top: 100px;
        font-size: 50px;
        z-index: 2;
        position: relative;
      }

      button {
        padding: 15px 30px;
        font-size: 20px;
        border: none;
        border-radius: 30px;
        background: white;
        color: #ff4d6d;
        cursor: pointer;
        z-index: 2;
        position: relative;
      }

      .card {
        display: none;
        margin-top: 40px;
        font-size: 24px;
        animation: fade 2s;
        z-index: 2;
        position: relative;
      }

      @keyframes fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* trái tim bay */

      .heart {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: float 5s linear infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-100vh);
        }
      }

      /* pháo hoa */

      .firework {
        position: absolute;
        font-size: 30px;
        animation: boom 1s forwards;
      }

      @keyframes boom {
        0% {
          transform: scale(0);
        }
        100% {
          transform: scale(2);
          opacity: 0;
        }
      }

      /* canvas trái tim */

      canvas {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
      }
    </style>
  </head>

  <body>
    <canvas id="pinkboard"></canvas>

    <h1>🌸 CHÚC MỪNG NGÀY 8/3 🌸</h1>

    <button onclick="openCard()">Mở thiệp 💌</button>

    <div class="card" id="card">
      <p>
        Hôm nay mùng tám tháng ba
        <br /><br />
        Gửi Yến một chút thiết tha chân thành
        <br /><br />
        Chúc em xinh đẹp hiền lành
        <br /><br />
        Ngày vui rạng rỡ, ngọt lành như hoa! 🌹

        <br /><br />

        Chúc em 8/3 vui vẻ nha 🌷
        <br /><br />
        <h2>❤️ LOVE ❤️</h2>
        <h3>Anh T giấu tên</h3>
      </p>

     
    </div>

    <script>
      /* mở thiệp */

      function openCard() {
        document.getElementById("card").style.display = "block";
        launchFireworks();
      }

      /* trái tim bay */

      function heart() {
        const h = document.createElement("div");

        h.className = "heart";
        h.innerHTML = "❤️";

        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = 20 + Math.random() * 30 + "px";

        document.body.appendChild(h);

        setTimeout(() => h.remove(), 5000);
      }

      setInterval(heart, 300);

      /* pháo hoa */

      function launchFireworks() {
        for (let i = 0; i < 25; i++) {
          const f = document.createElement("div");

          f.className = "firework";
          f.innerHTML = "🎆";

          f.style.left = Math.random() * 100 + "vw";
          f.style.top = Math.random() * 100 + "vh";

          document.body.appendChild(f);

          setTimeout(() => f.remove(), 1000);
        }
      }
    </script>

    <script>
      /*
Particle heart effect (code bạn gửi)
*/

      var settings = {
        particles: {
          length: 500,
          duration: 2,
          velocity: 100,
          effect: -0.75,
          size: 30,
        },
      };

      (function () {
        var b = 0;
        var c = ["ms", "moz", "webkit", "o"];
        for (var a = 0; a < c.length && !window.requestAnimationFrame; ++a) {
          window.requestAnimationFrame = window[c[a] + "RequestAnimationFrame"];
          window.cancelAnimationFrame =
            window[c[a] + "CancelAnimationFrame"] ||
            window[c[a] + "CancelRequestAnimationFrame"];
        }
        if (!window.requestAnimationFrame) {
          window.requestAnimationFrame = function (h) {
            var d = new Date().getTime();
            var f = Math.max(0, 16 - (d - b));
            var g = setTimeout(function () {
              h(d + f);
            }, f);
            b = d + f;
            return g;
          };
        }
      })();

      var Point = function (x, y) {
        this.x = x || 0;
        this.y = y || 0;
      };

      Point.prototype.clone = function () {
        return new Point(this.x, this.y);
      };

      Point.prototype.length = function (length) {
        if (length === undefined)
          return Math.sqrt(this.x * this.x + this.y * this.y);
        this.normalize();
        this.x *= length;
        this.y *= length;
        return this;
      };

      Point.prototype.normalize = function () {
        var length = this.length();
        this.x /= length;
        this.y /= length;
        return this;
      };

      var Particle = function () {
        this.position = new Point();
        this.velocity = new Point();
        this.acceleration = new Point();
        this.age = 0;
      };

      Particle.prototype.initialize = function (x, y, dx, dy) {
        this.position.x = x;
        this.position.y = y;
        this.velocity.x = dx;
        this.velocity.y = dy;
        this.acceleration.x = dx * settings.particles.effect;
        this.acceleration.y = dy * settings.particles.effect;
        this.age = 0;
      };

      Particle.prototype.update = function (deltaTime) {
        this.position.x += this.velocity.x * deltaTime;
        this.position.y += this.velocity.y * deltaTime;
        this.velocity.x += this.acceleration.x * deltaTime;
        this.velocity.y += this.acceleration.y * deltaTime;
        this.age += deltaTime;
      };

      Particle.prototype.draw = function (context, image) {
        function ease(t) {
          return --t * t * t + 1;
        }

        var size = image.width * ease(this.age / settings.particles.duration);

        context.globalAlpha = 1 - this.age / settings.particles.duration;

        context.drawImage(
          image,
          this.position.x - size / 2,
          this.position.y - size / 2,
          size,
          size,
        );
      };

      var ParticlePool = function (length) {
        var particles = new Array(length);

        for (var i = 0; i < particles.length; i++)
          particles[i] = new Particle();

        var firstActive = 0;
        var firstFree = 0;
        var duration = settings.particles.duration;

        this.add = function (x, y, dx, dy) {
          particles[firstFree].initialize(x, y, dx, dy);

          firstFree++;

          if (firstFree == particles.length) firstFree = 0;

          if (firstActive == firstFree) firstActive++;

          if (firstActive == particles.length) firstActive = 0;
        };

        this.update = function (deltaTime) {
          var i;

          if (firstActive < firstFree) {
            for (i = firstActive; i < firstFree; i++)
              particles[i].update(deltaTime);
          }

          if (firstFree < firstActive) {
            for (i = firstActive; i < particles.length; i++)
              particles[i].update(deltaTime);

            for (i = 0; i < firstFree; i++) particles[i].update(deltaTime);
          }

          while (
            particles[firstActive].age >= duration &&
            firstActive != firstFree
          ) {
            firstActive++;
            if (firstActive == particles.length) firstActive = 0;
          }
        };

        this.draw = function (context, image) {
          var i;

          if (firstActive < firstFree) {
            for (i = firstActive; i < firstFree; i++)
              particles[i].draw(context, image);
          }

          if (firstFree < firstActive) {
            for (i = firstActive; i < particles.length; i++)
              particles[i].draw(context, image);

            for (i = 0; i < firstFree; i++) particles[i].draw(context, image);
          }
        };
      };

      (function (canvas) {
        var context = canvas.getContext("2d");
        var particles = new ParticlePool(settings.particles.length);

        var particleRate =
          settings.particles.length / settings.particles.duration;

        var time;

        function pointOnHeart(t) {
          return new Point(
            160 * Math.pow(Math.sin(t), 3),

            130 * Math.cos(t) -
              50 * Math.cos(2 * t) -
              20 * Math.cos(3 * t) -
              10 * Math.cos(4 * t) +
              25,
          );
        }

        var image = (function () {
          var canvas = document.createElement("canvas");
          var context = canvas.getContext("2d");

          canvas.width = settings.particles.size;
          canvas.height = settings.particles.size;

          function to(t) {
            var point = pointOnHeart(t);

            point.x =
              settings.particles.size / 2 +
              (point.x * settings.particles.size) / 350;

            point.y =
              settings.particles.size / 2 -
              (point.y * settings.particles.size) / 350;

            return point;
          }

          context.beginPath();

          var t = -Math.PI;

          var point = to(t);

          context.moveTo(point.x, point.y);

          while (t < Math.PI) {
            t += 0.01;
            point = to(t);
            context.lineTo(point.x, point.y);
          }

          context.closePath();

          context.fillStyle = "#ff2a6d";

          context.fill();

          var image = new Image();

          image.src = canvas.toDataURL();

          return image;
        })();

        function render() {
          requestAnimationFrame(render);

          var newTime = new Date().getTime() / 1000;

          var deltaTime = newTime - (time || newTime);

          time = newTime;

          context.clearRect(0, 0, canvas.width, canvas.height);

          var amount = particleRate * deltaTime;

          for (var i = 0; i < amount; i++) {
            var pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());

            var dir = pos.clone().length(settings.particles.velocity);

            particles.add(
              canvas.width / 2 + pos.x,
              canvas.height / 2 - pos.y,
              dir.x,
              -dir.y,
            );
          }

          particles.update(deltaTime);

          particles.draw(context, image);
        }

        function onResize() {
          canvas.width = canvas.clientWidth;

          canvas.height = canvas.clientHeight;
        }

        window.onresize = onResize;

        setTimeout(function () {
          onResize();

          render();
        }, 10);
      })(document.getElementById("pinkboard"));
    </script>
  </body>
</html>
